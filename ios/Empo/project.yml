name: Empo
options:
  bundleIdPrefix: sh.mateo
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    CLANG_CXX_LANGUAGE_STANDARD: c++14
    CLANG_ENABLE_OBJC_ARC: YES
    CLANG_ENABLE_MODULES: NO
    OTHER_CFLAGS: -fdeclspec
    WARNING_CFLAGS: "-Wno-documentation -Wno-shorten-64-to-32 -Wno-deprecated-declarations -Wno-uninitialized -Wno-conditional-uninitialized -Wno-undefined-var-template -Wno-comma -Wno-switch -Wno-unused-const-variable -Wno-deprecated-literal-operator -Wno-unused-function"
    DEPENDENCY_SEARCH_PATH: $(PROJECT_DIR)/../Dependencies/build-$(PLATFORM_NAME)-arm64
    HEADER_SEARCH_PATHS:
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/src
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/src/audio
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/src/crypto
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/src/display
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/src/display/gl
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/src/display/libnsgif
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/src/etc
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/src/filesystem
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/src/input
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/src/net
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/src/system
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/src/theoraplay
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/src/util
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/binding
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/shader
      # H-Mode7 port (//hmode7-apple-mobile submodule). Headers live
      # next to the .cpp sources; the binding layer includes them via
      # short names (hm7_apply_opacity.h etc.).
      - $(PROJECT_DIR)/../../mkxp-z-apple-mobile/hmode7/src
      - $(PROJECT_DIR)/shims
      - $(PROJECT_DIR)/shims/libarchive
      - $(DEPENDENCY_SEARCH_PATH)/include/SDL2
      - $(DEPENDENCY_SEARCH_PATH)/include/pixman-1
      - $(DEPENDENCY_SEARCH_PATH)/include/uchardet
      - $(DEPENDENCY_SEARCH_PATH)/include/freetype2
      - $(PROJECT_DIR)/../Dependencies/ANGLE/$(PLATFORM_NAME)/include
    SYSTEM_HEADER_SEARCH_PATHS:
      - $(DEPENDENCY_SEARCH_PATH)/include
    FRAMEWORK_SEARCH_PATHS: []
    LIBRARY_SEARCH_PATHS:
      - $(DEPENDENCY_SEARCH_PATH)/lib
      - $(PROJECT_DIR)/../Dependencies/ANGLE/$(PLATFORM_NAME)/lib
    GCC_PREPROCESSOR_DEFINITIONS:
      - MKXPZ_BUILD_XCODE
      - MKXPZ_ALCDEVICE=ALCdevice_struct
      - 'MKXPZ_VERSION="\"1.0.0\""'
      - 'MKXPZ_GIT_HASH="\"ios\""'
      - 'MKXPZ_RUBY_VERSION="\"3.1\""'
      - MKXPZ_HAVE_SYNTAX_TRANSFORM_PATCHES
      - GLES2_HEADER
      - MKXPZ_HAS_ANGLE
      - HAVE_CONFIG_H
      # Selects the real mkxp-z Bitmap/Table/Ruby wrappers in
      # hmode7-apple-mobile/src/hm7_bindings.cpp. Without this the
      # file compiles the unit-test stub path (returns nullptr for
      # everything), which would make the renderer produce no
      # output despite the binding being registered.
      - HM7_HAVE_MKXP_BITMAP
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: YES
  configs:
    Release:
      OTHER_CFLAGS: "-fdeclspec -O3"
targets:
  Empo:
    type: application
    platform: iOS
    preBuildScripts:
      - name: Verify hmode7 submodule is up to date
        # Guard against a stale h-mode7 port submodule. The port is
        # maintained in a sibling repo (//hmode7-apple-mobile) and
        # included here as the `hmode7/` submodule. Because it's a
        # submodule, `git pull` in mkxp-z-apple-mobile does NOT pull
        # its contents - you'd get the recorded commit ID and keep
        # whatever working-tree state was there.
        #
        # This caused a real debugging wasted hour: the "canonical"
        # port repo at `/tmp/hmode7-apple-mobile` was being edited,
        # but the build was compiling the SUBMODULE copy which hadn't
        # been updated. xcodebuild succeeded each time with stale
        # code, and the rendering bugs "reappeared" every test run.
        #
        # The rule going forward: edit the submodule directly
        # (`mkxp-z-apple-mobile/hmode7/src/*.cpp`), commit from there,
        # push to origin, and bump the parent-repo submodule pointer.
        # This script fails the build if either:
        #   (a) the submodule working tree has uncommitted changes, OR
        #   (b) the submodule HEAD is behind `origin/main`.
        # Both conditions mean the build would pick up code that
        # wouldn't match what's committed, silently. Fast-fail with
        # a clear message instead.
        basedOnDependencyAnalysis: false
        script: |
          set -e
          HMODE7_DIR="${PROJECT_DIR}/../../mkxp-z-apple-mobile/hmode7"
          if [ ! -d "$HMODE7_DIR" ]; then
              echo "error: hmode7 submodule missing at $HMODE7_DIR" >&2
              echo "hint: run 'git submodule update --init --recursive' in mkxp-z-apple-mobile" >&2
              exit 1
          fi
          cd "$HMODE7_DIR"

          # Uncommitted working-tree changes.
          if ! git diff --quiet HEAD; then
              echo "error: hmode7 submodule has uncommitted changes:" >&2
              git status --short >&2
              echo "hint: commit+push from the submodule, then 'git submodule update' in the parent" >&2
              exit 1
          fi

          # Local commits that haven't been pushed.
          CURRENT="$(git rev-parse HEAD)"
          BRANCH="$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo main)"
          if [ "$BRANCH" = "HEAD" ]; then BRANCH="main"; fi
          # Fetch silently to learn the remote tip; timeouts don't
          # fail the build (offline dev still works), but mismatch
          # with the locally-known remote does.
          git fetch --quiet origin "$BRANCH" 2>/dev/null || true
          REMOTE="$(git rev-parse "origin/${BRANCH}" 2>/dev/null || echo "")"
          if [ -n "$REMOTE" ] && [ "$CURRENT" != "$REMOTE" ]; then
              echo "error: hmode7 submodule is out of sync with origin/${BRANCH}" >&2
              echo "  submodule HEAD: $CURRENT" >&2
              echo "  origin/$BRANCH: $REMOTE" >&2
              echo "hint: from mkxp-z-apple-mobile/hmode7, run 'git push' then update the submodule pointer" >&2
              exit 1
          fi

      - name: Assemble Assets.bundle
        # Force every build. The script globs the engine's shader/font/
        # script directories and copies whatever is there, so declaring
        # a static outputFiles list would drift out of date and silently
        # drop newly-added assets.
        basedOnDependencyAnalysis: false
        script: |
          ENGINE="${PROJECT_DIR}/../../mkxp-z-apple-mobile"
          BUNDLE="${PROJECT_DIR}/Assets.bundle"

          # Shaders
          mkdir -p "$BUNDLE/Shaders"
          cp "$ENGINE"/shader/*.frag "$BUNDLE/Shaders/" 2>/dev/null || true
          cp "$ENGINE"/shader/*.vert "$BUNDLE/Shaders/" 2>/dev/null || true
          cp "$ENGINE"/shader/*.h    "$BUNDLE/Shaders/" 2>/dev/null || true

          # Fonts
          mkdir -p "$BUNDLE/Fonts"
          cp "$ENGINE"/assets/liberation.ttf   "$BUNDLE/Fonts/"
          cp "$ENGINE"/assets/wqymicrohei.ttf  "$BUNDLE/Fonts/"

          # Loose assets
          cp "$ENGINE"/assets/gamecontrollerdb.txt "$BUNDLE/"
          cp "$ENGINE"/assets/icon.png             "$BUNDLE/"

          # Preload scripts
          mkdir -p "$BUNDLE/Preload"
          cp "$ENGINE"/scripts/preload/*.rb "$BUNDLE/Preload/"

          # Postload scripts
          mkdir -p "$BUNDLE/Postload"
          cp "$ENGINE"/scripts/postload/*.rb "$BUNDLE/Postload/"

          # Curated game patches.
          # Mirror layout (gameRegistry.json + _global/ + per-game
          # subdirs) into the bundle so the runtime can resolve a
          # canonical id from the game's manifest/Game.ini and write
          # the merged patches.json into the game folder at launch.
          # See ios/Empo/curated-patches/gameRegistry.json for the
          # registry schema and `src/Library/PatcherDistribution.swift`
          # (Empo) for the resolver + writer.
          rm -rf "$BUNDLE/Patches"
          mkdir -p "$BUNDLE/Patches"
          cp -R "${PROJECT_DIR}/curated-patches/"* "$BUNDLE/Patches/"

          # Splash background icon pack. Pixelated 16x16 SVGs that
          # the splash's PixelDitherPattern picks N random ones from
          # each launch instead of the historical hand-coded
          # circle/cross/diamond shapes. See `src/Design/SplashIcons.swift`
          # for the loader + parser and RootView.swift for the
          # consumer.
          rm -rf "$BUNDLE/SplashIcons"
          mkdir -p "$BUNDLE/SplashIcons"
          cp "${PROJECT_DIR}/curated-splash-icons/"*.svg "$BUNDLE/SplashIcons/"
      - name: Generate Git Info
        # Force this script to run every build. Without this, Xcode sees
        # the declared output file already on disk and skips the script,
        # so changing a branch / commit / dirty state wouldn't be
        # reflected in the app until a clean build.
        basedOnDependencyAnalysis: false
        script: |
          REPO="${PROJECT_DIR}/../.."
          COMMIT=$(git -C "$REPO" rev-parse --short HEAD 2>/dev/null || echo "unknown")
          if git -C "$REPO" diff --quiet HEAD 2>/dev/null; then DIRTY="false"; else DIRTY="true"; fi
          BRANCH=$(git -C "$REPO" symbolic-ref --quiet --short HEAD 2>/dev/null || echo "")
          DEFAULT_BRANCH=$(git -C "$REPO" symbolic-ref --quiet --short refs/remotes/origin/HEAD 2>/dev/null | sed 's|^origin/||' || echo "main")
          [ -z "$DEFAULT_BRANCH" ] && DEFAULT_BRANCH="main"
          OUT="${PROJECT_DIR}/src/App/GitInfo.generated.swift"
          NEW=$(
            echo "// Auto-generated by build script — do not edit"
            echo "enum GitInfo {"
            echo "    static let commit = \"$COMMIT\""
            echo "    static let dirty = $DIRTY"
            echo "    static let branch = \"$BRANCH\""
            echo "    static let defaultBranch = \"$DEFAULT_BRANCH\""
            echo "}"
          )
          # Only touch the file when the content actually changed so
          # downstream Swift compilation isn't invalidated on every
          # build when nothing relevant has shifted.
          if [ ! -f "$OUT" ] || [ "$(cat "$OUT")" != "$NEW" ]; then
            echo "$NEW" > "$OUT"
          fi
    sources:
      - path: ../../mkxp-z-apple-mobile/src/main.cpp
      - path: ../../mkxp-z-apple-mobile/src/eventthread.cpp
      - path: ../../mkxp-z-apple-mobile/src/sharedstate.cpp
      - path: ../../mkxp-z-apple-mobile/src/patcher.cpp
      - path: ../../mkxp-z-apple-mobile/src/config.cpp
      - path: ../../mkxp-z-apple-mobile/src/crypto/rgssad.cpp
      - path: ../../mkxp-z-apple-mobile/src/util/iniconfig.cpp
      - path: ../../mkxp-z-apple-mobile/src/filesystem/filesystem.cpp
      - path: ../../mkxp-z-apple-mobile/src/input/input.cpp
      - path: ../../mkxp-z-apple-mobile/src/input/keybindings.cpp
      - path: ../../mkxp-z-apple-mobile/src/audio/audio.cpp
      - path: ../../mkxp-z-apple-mobile/src/audio/audiostream.cpp
      - path: ../../mkxp-z-apple-mobile/src/audio/alstream.cpp
      - path: ../../mkxp-z-apple-mobile/src/audio/soundemitter.cpp
      - path: ../../mkxp-z-apple-mobile/src/audio/sdlsoundsource.cpp
      - path: ../../mkxp-z-apple-mobile/src/audio/vorbissource.cpp
      - path: ../../mkxp-z-apple-mobile/src/audio/midisource.cpp
      - path: ../../mkxp-z-apple-mobile/src/audio/fluid-fun.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/graphics.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/movie.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/bitmap.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/font.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/sprite.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/plane.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/viewport.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/window.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/windowvx.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/tilemap.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/tilemapvx.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/autotiles.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/autotilesvx.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/gl/shader.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/gl/glstate.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/gl/gl-fun.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/gl/gl-meta.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/gl/gl-debug.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/gl/vertex.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/gl/scene.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/gl/texpool.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/gl/tileatlas.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/gl/tileatlasvx.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/gl/tilequad.cpp
      - path: ../../mkxp-z-apple-mobile/src/etc/etc.cpp
      - path: ../../mkxp-z-apple-mobile/src/etc/table.cpp
      - path: ../../mkxp-z-apple-mobile/src/net/net.cpp
      - path: ../../mkxp-z-apple-mobile/src/net/LUrlParser.cpp
      - path: ../../mkxp-z-apple-mobile/src/display/libnsgif/libnsgif.c
      - path: ../../mkxp-z-apple-mobile/src/display/libnsgif/lzw.c
      - path: ../../mkxp-z-apple-mobile/src/theoraplay/theoraplay.c
      - path: ../../mkxp-z-apple-mobile/binding/binding-mri.cpp
      - path: ../../mkxp-z-apple-mobile/binding/binding-util.cpp
      - path: ../../mkxp-z-apple-mobile/binding/bitmap-binding.cpp
      - path: ../../mkxp-z-apple-mobile/binding/table-binding.cpp
      - path: ../../mkxp-z-apple-mobile/binding/etc-binding.cpp
      - path: ../../mkxp-z-apple-mobile/binding/font-binding.cpp
      - path: ../../mkxp-z-apple-mobile/binding/sprite-binding.cpp
      - path: ../../mkxp-z-apple-mobile/binding/viewport-binding.cpp
      - path: ../../mkxp-z-apple-mobile/binding/plane-binding.cpp
      - path: ../../mkxp-z-apple-mobile/binding/window-binding.cpp
      - path: ../../mkxp-z-apple-mobile/binding/windowvx-binding.cpp
      - path: ../../mkxp-z-apple-mobile/binding/tilemap-binding.cpp
      - path: ../../mkxp-z-apple-mobile/binding/tilemapvx-binding.cpp
      - path: ../../mkxp-z-apple-mobile/binding/input-binding.cpp
      - path: ../../mkxp-z-apple-mobile/binding/audio-binding.cpp
      - path: ../../mkxp-z-apple-mobile/binding/graphics-binding.cpp
      - path: ../../mkxp-z-apple-mobile/binding/filesystem-binding.cpp
      - path: ../../mkxp-z-apple-mobile/binding/http-binding.cpp
      - path: ../../mkxp-z-apple-mobile/binding/module_rpg.cpp
      # H-Mode7 native renderer binding.
      - path: ../../mkxp-z-apple-mobile/binding/hmode7-binding.cpp
      # H-Mode7 port sources. Each .cpp is a single function from the
      # original MGC_Hmode7_1_4_4.cpp, ported to top-down SDL surfaces
      # and Ruby 3.1 MRI. See //hmode7-apple-mobile/docs/HMODE7_PORT_DESIGN.md.
      - path: ../../mkxp-z-apple-mobile/hmode7/src/hm7_bindings.cpp
      - path: ../../mkxp-z-apple-mobile/hmode7/src/hm7_apply_opacity.cpp
      - path: ../../mkxp-z-apple-mobile/hmode7/src/hm7_apply_zoom.cpp
      - path: ../../mkxp-z-apple-mobile/hmode7/src/hm7_apply_lighting.cpp
      - path: ../../mkxp-z-apple-mobile/hmode7/src/hm7_compute_m7.cpp
      - path: ../../mkxp-z-apple-mobile/hmode7/src/hm7_draw_heightmap.cpp
      - path: ../../mkxp-z-apple-mobile/hmode7/src/hm7_draw_textureset.cpp
      - path: ../../mkxp-z-apple-mobile/hmode7/src/hm7_draw_map_tileset.cpp
      - path: ../../mkxp-z-apple-mobile/hmode7/src/hm7_render.cpp
      - path: ../../mkxp-z-apple-mobile/src/app_bridge.cpp
      - path: ../../mkxp-z-apple-mobile/src/angle_native_layer.mm
      - path: src
        type: group
      - path: PrivacyInfo.xcprivacy
      - path: Assets.bundle
        type: folder
        buildPhase: resources
    # Code signing is configured via a local, untracked xcconfig
    # (Signing.xcconfig at the repo root of this target) so contributors
    # can each drop in their own Apple Developer team ID without
    # touching the project file. See Signing.xcconfig.example for the
    # expected format. xcodegen will still generate a working project
    # if the file is absent; the build then fails at signing time with
    # a clear "no team selected" error rather than quietly signing
    # under someone else's identity.
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.mateo.empo
        INFOPLIST_FILE: $(PROJECT_DIR)/Info.plist
        PRODUCT_NAME: Empo
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.0"
        SWIFT_OBJC_BRIDGING_HEADER: $(PROJECT_DIR)/src/Empo-Bridging-Header.h
        OTHER_LDFLAGS:
          - -lSDL2
          - -lSDL2main
          - -lSDL2_image
          - -lSDL2_sound
          - -lSDL2_ttf
          - -lruby.3.1-static
          - -lruby.3.1-ext
          - -lfreetype
          - -lpixman-1
          - -lpng16
          - -logg
          - -lvorbis
          - -lvorbisfile
          - -ltheora
          - -ltheoradec
          - -lphysfs
          - -luchardet
          - -lz
          - -lbz2
          - -liconv
          - -larchive
          - -ldl
          - -lpthread
          - -framework Foundation
          - -framework UIKit
          - -framework CoreFoundation
          - -framework CoreGraphics
          - -framework CoreVideo
          - -framework CoreAudio
          - -framework AudioToolbox
          - -framework AVFoundation
          - -framework Metal
          - -framework OpenAL
          - -framework QuartzCore
          - -framework GameController
          - -framework CoreMotion
          - -weak_framework CoreBluetooth
          - -weak_framework CoreHaptics
          - -lANGLE_static
          - -lEGL_static
          - -lGLESv2_static
    dependencies: []
