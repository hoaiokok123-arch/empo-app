name: Submodule Guard

on:
  pull_request:
  push:
    branches: [main]

jobs:
  mkxp-dev-pointer:
    name: mkxp-z submodule points to origin/dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify mkxp-z-apple-mobile pointer is on origin/dev
        run: |
          SUBMODULE_BRANCH=$(git config -f .gitmodules --get submodule.mkxp-z-apple-mobile.branch || echo dev)
          SUBMODULE_URL=$(git config -f .gitmodules --get submodule.mkxp-z-apple-mobile.url)
          case "$SUBMODULE_URL" in
            git@github.com:*) SUBMODULE_URL="https://github.com/${SUBMODULE_URL#git@github.com:}" ;;
            ssh://git@github.com/*) SUBMODULE_URL="https://github.com/${SUBMODULE_URL#ssh://git@github.com/}" ;;
          esac
          SUBMODULE_URL="${SUBMODULE_URL%.git}"
          SUBMODULE_SHA=$(git ls-tree HEAD mkxp-z-apple-mobile | while read -r _ _ sha _; do
            printf '%s' "$sha"
          done)
          if [ -z "$SUBMODULE_SHA" ]; then
            echo "::error::could not resolve mkxp-z-apple-mobile gitlink from parent commit"
            exit 1
          fi
          TMP_REPO=$(mktemp -d)
          git init "$TMP_REPO"
          git -C "$TMP_REPO" remote add origin "$SUBMODULE_URL"
          git -C "$TMP_REPO" fetch --depth 200 origin "$SUBMODULE_BRANCH"
          git -C "$TMP_REPO" fetch --depth 1 origin "$SUBMODULE_SHA" || true
          if ! git -C "$TMP_REPO" merge-base --is-ancestor "$SUBMODULE_SHA" "origin/$SUBMODULE_BRANCH"; then
            echo "::error::mkxp-z-apple-mobile submodule points to $SUBMODULE_SHA, which is not reachable from origin/$SUBMODULE_BRANCH"
            exit 1
          fi
