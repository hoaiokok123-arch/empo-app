name: macOS iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-simulator:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Initialize submodules manually
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:
          git config --global url."https://github.com/".insteadOf ssh://git@github.com/

          # Clear potentially-broken checkouts so submodule update can re-populate cleanly
          rm -rf ios/Dependencies/sources/sdl2 || true
          rm -rf ios/Dependencies/sources/sdl2_image || true

          git submodule sync --recursive || true
          git submodule update --init --recursive --force || true

          # If submodule update still didn't populate SDL2, clone it explicitly
          if [ ! -d ios/Dependencies/sources/sdl2 ] || ! git -C ios/Dependencies/sources/sdl2 rev-parse --verify HEAD >/dev/null 2>&1; then
            rm -rf ios/Dependencies/sources/sdl2 || true
            git clone --depth 1 --branch mkxp-z-2.28.1 https://github.com/mkxp-z/SDL ios/Dependencies/sources/sdl2 || true
          fi

          # Ensure SDL2 has the branch checked out
          if [ -d ios/Dependencies/sources/sdl2 ]; then
            git -C ios/Dependencies/sources/sdl2 fetch --all --tags || true
            git -C ios/Dependencies/sources/sdl2 checkout -B mkxp-z-2.28.1 origin/mkxp-z-2.28.1 || true
          fi

          # Ensure SDL2_image is present (some builds expect this)
          if [ ! -d ios/Dependencies/sources/sdl2_image ] || ! git -C ios/Dependencies/sources/sdl2_image rev-parse --verify HEAD >/dev/null 2>&1; then
            rm -rf ios/Dependencies/sources/sdl2_image || true
            git clone --depth 1 --branch mkxp-z https://github.com/mkxp-z/SDL_image ios/Dependencies/sources/sdl2_image || true
          fi

          git submodule status --recursive || true

      - name: Install Homebrew dependencies
        run: |
          brew update || true
          brew install bun xcodegen autoconf automake libtool cmake pkg-config git-cliff || true

      - name: Install JS hooks (bun)
        run: |
          if [ -f package.json ]; then bun install || true; fi
          if [ -d mkxp-z-apple-mobile ] && [ -f mkxp-z-apple-mobile/package.json ]; then (cd mkxp-z-apple-mobile && bun install) || true; fi

      - name: Build simulator native deps
        run: |
          make -C ios/Dependencies -f iphonesimulator.make deps-core

      - name: Generate Xcode project
        run: |
          xcodegen generate --spec ios/Empo/project.yml --project ios/Empo --quiet

      - name: Build Empo (simulator)
        run: |
          xcodebuild -project ios/Empo/Empo.xcodeproj -target Empo -sdk iphonesimulator -arch arm64 -configuration Debug build CODE_SIGNING_ALLOWED=NO | grep -E "^(Build|error:|warning: |CompileSwift|Ld )" || true

      - name: Upload Empo.app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Empo.app
          path: ios/Empo/build/Debug-iphonesimulator/Empo.app
