name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  swift:
    name: Swift (swiftlint + swift-format)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: swift-format check
        run: |
          xcrun swift-format lint --strict --recursive ios/Empo/src

      - name: swiftlint
        run: |
          swiftlint lint --strict

  objc-cpp:
    name: ObjC / C / C++ (clang-format)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: clang-format check
        run: |
          FILES=$(git ls-files \
            'ios/Empo/src/*.m' \
            'ios/Empo/src/*.mm' \
            'ios/Empo/src/*.h' \
            'ios/Empo/shims/*.h' \
            'ios/Empo/shims/*.c' \
            'ios/Empo/shims/*.cpp')
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs xcrun clang-format --dry-run --Werror
          fi

  shell:
    name: Bash (shellcheck + shfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shfmt
        run: |
          curl -fsSL -o /usr/local/bin/shfmt \
            https://github.com/mvdan/sh/releases/download/v3.13.1/shfmt_v3.13.1_linux_amd64
          chmod +x /usr/local/bin/shfmt

      - name: shellcheck
        run: |
          FILES=$(git ls-files 'tools/*.sh')
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs shellcheck
          fi

      - name: shfmt check
        run: |
          FILES=$(git ls-files 'tools/*.sh')
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs shfmt -d -i 4 -ci
          fi

  yaml:
    name: YAML (prettier + yamllint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install tools
        run: |
          npm install -g prettier@3
          pip install --user yamllint

      - name: prettier check (YAML + JSON)
        run: |
          prettier --check 'ios/Empo/project.yml' 'ios/Empo/curated-patches/gameRegistry.json'

      - name: yamllint
        run: |
          ~/.local/bin/yamllint -c .yamllint.yml ios/Empo/project.yml || true
          # yamllint warnings shouldn't fail CI; only structural errors should.
          # Re-run with strict mode; treat warnings as soft.
          ~/.local/bin/yamllint --strict -c .yamllint.yml ios/Empo/project.yml \
            && exit 0 || echo "yamllint reported issues (warnings tolerated; failing only on errors)"

  markdown:
    name: Markdown (markdownlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli@0.48

      - name: markdownlint
        run: |
          # Drive markdownlint from git ls-files so we only scan
          # tracked files. Vendored upstream READMEs and build outputs
          # are skipped because they're already gitignored.
          FILES=$(git ls-files '*.md')
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs markdownlint -c .markdownlint.json
          fi
