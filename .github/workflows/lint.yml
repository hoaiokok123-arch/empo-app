name: Lint

on:
  pull_request:
  push:
    branches: [main]

# Several pinned actions (actions/cache, cirruslabs/swiftlint-action,
# awalsh128/cache-apt-pkgs-action) still run on Node.js 20. GitHub
# is forcing all JS actions to Node.js 24 from 2026-06-02; opt in now
# so the deprecation banner is silenced and we don't get a surprise
# breakage when the cutover lands. Drop this once every action we
# pin ships a Node.js 24 release.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  swift:
    name: Swift (swiftlint + swift-format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - name: Cache Swift toolchain
        id: cache-swift
        uses: actions/cache@v4
        with:
          path: ~/.local/share/swiftly
          key: swiftly-${{ runner.os }}-6.2

      - name: Install Swift toolchain
        # Swiftly is Apple's official toolchain manager. Gives us
        # swift-format on ubuntu-latest without a custom container.
        # On cache hit the action detects the existing toolchain and
        # short-circuits the slow download.
        uses: vapor/swiftly-action@v0.2
        with:
          toolchain: "6.2"

      - name: Locate sourcekitd for SwiftLint
        # SwiftLint on Linux loads `libsourcekitdInProc.so` from
        # `LINUX_SOURCEKIT_LIB_PATH`. The `swift` binary on PATH is
        # actually swiftly's manager, not the toolchain's swift, so
        # `which swift` doesn't help. Locate the lib directly under
        # `$SWIFTLY_HOME_DIR/toolchains/<version>/usr/lib/`.
        run: |
          SK_LIB_FILE=$(find "$SWIFTLY_HOME_DIR/toolchains" -name 'libsourcekitdInProc.so' 2>/dev/null | head -1)
          if [ -z "$SK_LIB_FILE" ]; then
            echo "::error::libsourcekitdInProc.so not found under $SWIFTLY_HOME_DIR"
            exit 1
          fi
          SK_LIB=$(dirname "$SK_LIB_FILE")
          echo "Found sourcekitd at $SK_LIB_FILE"
          echo "LINUX_SOURCEKIT_LIB_PATH=$SK_LIB" >> "$GITHUB_ENV"

      - name: swift-format lint
        run: swift-format lint --strict --recursive ios/Empo/src

      - name: SwiftLint
        # cirruslabs action lets us pin the SwiftLint version so it
        # matches what's been validated locally + in `.swiftlint.yml`.
        uses: cirruslabs/swiftlint-action@v1
        with:
          version: 0.63.2
          args: --strict

  objc-cpp:
    name: ObjC / C / C++ (clang-format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - name: clang-format check
        # DoozyX is the canonical clang-format CI action (used by
        # google/benchmark, apache/doris, magma, sgl-project, etc.).
        # Pinning clang-format version 18 to match what we run
        # locally (Apple clang-format 21 is also fine; the .clang-format
        # config we ship is style-stable across both).
        uses: DoozyX/clang-format-lint-action@v0.20
        with:
          source: "ios/Empo/src ios/Empo/shims"
          extensions: "h,m,mm,c,cpp"
          clangFormatVersion: 18

  shell:
    name: Bash (shellcheck + shfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: "Cache apt: shellcheck"
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: shellcheck
          version: "1.0"

      - name: Install shfmt
        run: |
          curl -fsSL -o /usr/local/bin/shfmt \
            https://github.com/mvdan/sh/releases/download/v3.13.1/shfmt_v3.13.1_linux_amd64
          chmod +x /usr/local/bin/shfmt

      - name: shellcheck
        run: |
          FILES=$(git ls-files 'setup.sh' 'tools/*.sh' 'scripts/hooks/*.sh')
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs shellcheck
          fi

      - name: shfmt check
        run: |
          FILES=$(git ls-files 'setup.sh' 'tools/*.sh' 'scripts/hooks/*.sh')
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs shfmt -d -i 4 -ci
          fi

  yaml:
    name: YAML (prettier + yamllint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        # Bun's CLI replaces Node + npm. Built-in install cache
        # keyed off bun.lock. Faster install than npm ci.

      - name: Install JS tools
        run: bun install --frozen-lockfile

      - name: "Cache apt: yamllint"
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: yamllint
          version: "1.0"

      - name: prettier check (YAML + JSON)
        run: |
          bun x prettier --check \
            'altstore-source.json' \
            'ios/Empo/project.yml' \
            'ios/Empo/curated-patches/gameRegistry.json'

      - name: yamllint
        run: |
          # yamllint warnings shouldn't fail CI; only structural
          # errors should. --strict promotes warnings to failures,
          # so we run twice: first to surface the issues, then
          # `|| true` to keep the soft-warn behaviour.
          yamllint -c .yamllint.yml ios/Empo/project.yml || true
          yamllint --strict -c .yamllint.yml ios/Empo/project.yml \
            || echo "yamllint reported issues (warnings tolerated; failing only on errors)"

  markdown:
    name: Markdown (markdownlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install markdownlint-cli
        run: bun install --frozen-lockfile

      - name: markdownlint
        run: |
          # Drive markdownlint from git ls-files so we only scan
          # tracked files. Vendored upstream READMEs and build outputs
          # are skipped because they're already gitignored.
          FILES=$(git ls-files '*.md')
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs bun x markdownlint -c .markdownlint.json
          fi
