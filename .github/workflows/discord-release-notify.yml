name: Notify Discord About Releases

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_name:
        description: Release title to post
        required: true
        type: string
      release_body:
        description: Release notes body to post
        required: true
        type: string
      release_html_url:
        description: Release URL to link in Discord
        required: false
        type: string

# The upstream action still declares Node.js 16. GitHub is forcing JS
# actions onto Node.js 24, so opt in now to avoid a surprise breakage
# when the platform cutover lands.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  notify:
    name: Post release changelog to Discord
    runs-on: ubuntu-latest
    steps:
      - name: Send release to Discord
        uses: SethCohen/github-releases-to-discord@v1
        with:
          webhook_url: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          username: Empo Releases
          footer_title: Empo Release Notes
          reduce_headings: true
          release_name: ${{ inputs.release_name }}
          release_body: ${{ inputs.release_body }}
          release_html_url: ${{ inputs.release_html_url }}
