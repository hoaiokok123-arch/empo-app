name: Format

on:
  pull_request:
  push:
    branches: [main]

# Several pinned actions (actions/cache, cirruslabs/swiftlint-action)
# still run on Node.js 20. GitHub is forcing all JS actions to
# Node.js 24 from 2026-06-02; opt in now so the deprecation banner is
# silenced and we don't get a surprise breakage when the cutover
# lands. Drop this once every action we pin ships a Node.js 24
# release.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Format job verifies that the formatters would not modify any
# tracked file. If they would, the job fails with a clear diff
# so the contributor knows exactly what to run locally.

jobs:
  swift:
    name: Swift (swift-format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - name: Cache Swift toolchain
        id: cache-swift
        uses: actions/cache@v4
        with:
          path: ~/.local/share/swiftly
          key: swiftly-${{ runner.os }}-6.2

      - name: Install Swift toolchain
        uses: vapor/swiftly-action@v0.2
        with:
          toolchain: "6.2"

      - name: swift-format check
        # Use the same `lint --strict` path as the Lint workflow.
        # swift-format's lint mode reports the same rule set the
        # formatter would apply, so a clean lint means format
        # would be a no-op; no separate check needed.
        run: swift-format lint --strict --recursive ios/Empo/src

  objc-cpp:
    name: ObjC / C / C++ (clang-format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - name: clang-format check
        uses: DoozyX/clang-format-lint-action@v0.20
        with:
          source: "ios/Empo/src ios/Empo/shims"
          extensions: "h,m,mm,c,cpp"
          clangFormatVersion: 18

  shell:
    name: Bash (shfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shfmt
        run: |
          curl -fsSL -o /usr/local/bin/shfmt \
            https://github.com/mvdan/sh/releases/download/v3.13.1/shfmt_v3.13.1_linux_amd64
          chmod +x /usr/local/bin/shfmt

      - name: shfmt check
        run: |
          FILES=$(git ls-files 'tools/*.sh')
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs shfmt -d -i 4 -ci
          fi

  yaml-json:
    name: YAML / JSON (prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install prettier
        run: bun install --frozen-lockfile

      - name: prettier check
        run: |
          bun x prettier --check 'ios/Empo/project.yml' 'ios/Empo/curated-patches/gameRegistry.json'
