name: Format

on:
  pull_request:
  push:
    branches: [main]

# Format job verifies that the formatters would not modify any
# tracked file. If they would, the job fails with a clear diff
# so the contributor knows exactly what to run locally.

jobs:
  swift:
    name: Swift (swift-format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - name: Install Swift toolchain
        uses: vapor/swiftly-action@v0.2
        with:
          toolchain: "6.2"

      - name: swift-format check
        # Use the same `lint --strict` path as the Lint workflow.
        # swift-format's lint mode reports the same rule set the
        # formatter would apply, so a clean lint means format
        # would be a no-op; no separate check needed.
        run: swift-format lint --strict --recursive ios/Empo/src

  objc-cpp:
    name: ObjC / C / C++ (clang-format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - name: clang-format check
        uses: DoozyX/clang-format-lint-action@v0.20
        with:
          source: "ios/Empo/src ios/Empo/shims"
          extensions: "h,m,mm,c,cpp"
          clangFormatVersion: 18

  shell:
    name: Bash (shfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shfmt
        run: |
          curl -fsSL -o /usr/local/bin/shfmt \
            https://github.com/mvdan/sh/releases/download/v3.13.1/shfmt_v3.13.1_linux_amd64
          chmod +x /usr/local/bin/shfmt

      - name: shfmt check
        run: |
          FILES=$(git ls-files 'tools/*.sh')
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs shfmt -d -i 4 -ci
          fi

  yaml-json:
    name: YAML / JSON (prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install prettier
        run: npm install -g prettier@3

      - name: prettier check
        run: |
          prettier --check 'ios/Empo/project.yml' 'ios/Empo/curated-patches/gameRegistry.json'
